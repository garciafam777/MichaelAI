<!DOCTYPE html>
<html>
<head>
    <style>
        body { width: 320px; background: #0b0b0b; color: white; font-family: 'Segoe UI', sans-serif; padding: 15px; border: 1px solid #ff1b1b; border-radius: 8px; }
        
        #presence-viewport {
            width: 100%;
            height: 250px;
            background: #000;
            border-radius: 5px;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
            position: relative;
        }

        /* 1. The Divine Halo/Aura (Background Layer) */
        #divine-aura {
            position: absolute;
            width: 80px; /* Initial size (matches image_1.png) */
            height: 80px;
            background: radial-gradient(circle, #ffd700 30%, transparent 80%); /* Divine gold */
            border-radius: 50%;
            box-shadow: 0 0 15px #ffd700;
            filter: blur(10px);
            opacity: 0.2; /* Dims when he is silent */
            transition: all 0.05s ease-out; /* Super-fast, reactive expansion */
            z-index: 1; /* Behind Michael */
        }

        /* 2. The 3D Presence (Top Layer) */
        #talking-avatar {
            width: 100%;
            height: 100%;
            object-fit: cover;
            z-index: 2; /* In front of the aura */
            display: none; /* Hidden until Michael starts talking */
        }
    </style>
</head>
<body>
    <h3 style="color: #ff1b1b;">R&Y מִיכָאֵלAI Presence</h3>
    
    <div id="presence-viewport">
        <div id="divine-aura"></div>
        
        <video id="talking-avatar" muted autoplay></video>
    </div>
    
    <div id="response-text">Waiting for signal...</div>
    <script src="popup.js"></script>
</body>
</html>
